<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CocoDeck — Etiquettes Vitrine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #f4efe6; color: #1a2e33; min-height: 100vh; }

  /* ===== APP SHELL ===== */
  .app-header {
    background: #fff; padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #e2dcd0;
    box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    position: sticky; top: 0; z-index: 100;
  }
  .app-header h1 { font-family: 'Archivo Black', sans-serif; font-size: 22px; letter-spacing: -0.5px; color: #0a4f5e; }
  .app-header .subtitle { font-size: 10px; color: #6b8a8f; margin-top: 1px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn { padding: 9px 18px; border: none; border-radius: 999px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .btn-primary { background: #0a4f5e; color: #ffd15c; }
  .btn-primary:hover { background: #0d6476; transform: translateY(-1px); }
  .btn-outline { background: #fff; color: #6b7a7d; border: 1.5px solid #dcd5c7; }
  .btn-outline:hover { background: #faf6ec; border-color: #0a4f5e; color: #0a4f5e; }
  .btn-small { padding: 6px 12px; font-size: 11px; }
  .btn-add { background: #ff6b4a; color: #fff; }
  .btn-add:hover { background: #ff5230; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 0; }
  .tab {
    padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer;
    border: none; background: transparent; color: #9aa8ab;
    border-bottom: 3px solid transparent; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif; text-transform: uppercase; letter-spacing: 1px;
  }
  .tab.active { color: #0a4f5e; border-bottom-color: #ff6b4a; }
  .tab:hover:not(.active) { color: #6b7a7d; }
  .tab .badge {
    display: inline-block; background: #ff6b4a; color: #fff;
    font-size: 10px; padding: 2px 7px; border-radius: 10px; margin-left: 4px;
    font-weight: 700;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 28px; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ===== CATALOGUE TAB ===== */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 20px; align-items: center;
  }
  .search-bar input {
    flex: 1; padding: 11px 16px; background: #fff; border: 1.5px solid #e2dcd0;
    border-radius: 999px; font-size: 14px; font-family: 'DM Sans', sans-serif;
  }
  .search-bar input:focus { outline: none; border-color: #0a4f5e; }
  .search-bar input::placeholder { color: #c0b8ac; }

  .cat-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .cat-filter {
    padding: 6px 14px; border-radius: 999px; font-size: 11px; font-weight: 700;
    cursor: pointer; border: 1.5px solid #e2dcd0; background: #fff; color: #8a958f;
    transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .cat-filter.active { background: #0a4f5e; color: #ffd15c; border-color: #0a4f5e; }
  .cat-filter:hover:not(.active) { border-color: #0a4f5e; color: #0a4f5e; }

  .catalog-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px;
  }
  .catalog-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 15px; background: #fff; border: 1.5px solid #ece6d9;
    border-radius: 14px; transition: all 0.15s; cursor: default;
  }
  .catalog-item:hover { border-color: #0a4f5e; background: #fafaf3; }
  .catalog-item.selected { border-color: #ff6b4a; background: #fff5f1; }
  .catalog-item .item-info { flex: 1; min-width: 0; }
  .catalog-item .item-name { font-size: 13px; font-weight: 600; color: #1a2e33; }
  .catalog-item .item-desc { font-size: 11px; color: #9aa8ab; margin-top: 1px; }
  .catalog-item .item-prix { font-size: 14px; font-weight: 800; color: #ff6b4a; white-space: nowrap; margin: 0 12px; }

  .select-summary {
    position: sticky; bottom: 0; background: #fff;
    padding: 14px 24px; border-top: 1.5px solid #e2dcd0;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.06); border-radius: 16px 16px 0 0;
    margin: 20px -28px -24px;
  }
  .select-summary .count { font-size: 14px; font-weight: 700; color: #0a4f5e; }
  .select-summary .count span { color: #ff6b4a; }

  /* ===== ETIQUETTES TAB ===== */
  .form-section {
    background: #fff; border-radius: 16px; padding: 22px;
    margin-bottom: 20px; border: 1.5px solid #e2dcd0;
  }
  .form-section h2 { font-size: 12px; font-weight: 700; color: #0a4f5e; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 2fr 2fr 1fr auto; gap: 10px; align-items: end; }
  .form-group label { display: block; font-size: 10px; color: #8a958f; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
  .form-group input, .form-group select {
    width: 100%; padding: 9px 12px; background: #faf8f2;
    border: 1.5px solid #e2dcd0; border-radius: 10px; color: #1a2e33;
    font-size: 13px; font-family: 'DM Sans', sans-serif;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #0a4f5e; }
  .form-group input::placeholder { color: #c0b8ac; }
  .form-actions { margin-top: 12px; display: flex; gap: 10px; align-items: center; }
  .form-hint { font-size: 10px; color: #b5b0a3; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-header h2 { font-size: 12px; font-weight: 700; color: #0a4f5e; text-transform: uppercase; letter-spacing: 1.5px; }
  .counter { background: #fff; padding: 3px 12px; border-radius: 999px; font-size: 11px; color: #0a4f5e; border: 1.5px solid #e2dcd0; font-weight: 600; }

  .etiquettes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }

  .etiquette-wrapper { position: relative; }
  .etiquette-wrapper .delete-btn {
    position: absolute; top: -5px; right: -5px;
    width: 22px; height: 22px; border-radius: 50%;
    background: #ff6b4a; color: #fff; border: 2px solid #f4efe6;
    cursor: pointer; font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s; z-index: 10;
    font-weight: 700;
  }
  .etiquette-wrapper:hover .delete-btn { opacity: 1; }
  /* Editable fields */
  .editable { cursor: text; border-radius: 4px; transition: background 0.15s; outline: none; min-height: 1em; }
  .editable:hover { background: rgba(0,0,0,0.04); }
  .editable:focus { background: rgba(0,0,0,0.07); box-shadow: 0 0 0 2px #ffd15c; }
  .etiq-bottom .editable:hover { background: rgba(255,255,255,0.12); }
  .etiq-bottom .editable:focus { background: rgba(255,255,255,0.2); box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }
  .editable[data-placeholder]:empty::before { content: attr(data-placeholder); color: rgba(122,140,145,0.45); font-style: italic; }
  .prix-unit { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 3px; font-weight: 600; letter-spacing: 0.5px; }

  .empty-state { grid-column: 1 / -1; text-align: center; padding: 50px 20px; color: #b5b0a3; }
  .empty-state .icon { font-size: 36px; margin-bottom: 8px; opacity: 0.5; }
  .empty-state p { font-size: 13px; max-width: 300px; margin: 0 auto; line-height: 1.6; }

  /* ===== ETIQUETTE COCODECK (STREET FOOD VIBE) ===== */
  .etiquette {
    width: 100%; aspect-ratio: 55/100; border-radius: 10px; overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform 0.15s, box-shadow 0.15s;
    background: #fff9ec;
    box-shadow: 0 3px 12px rgba(10,79,94,0.12);
    border: 1.5px solid #e8dfc7;
    position: relative;
  }
  .etiquette::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: repeating-linear-gradient(90deg, #ff6b4a 0, #ff6b4a 10px, #ffd15c 10px, #ffd15c 20px, #0a4f5e 20px, #0a4f5e 30px);
    z-index: 2;
  }
  .etiquette:hover { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(10,79,94,0.18); }

  .brand-tag {
    padding: 14px 8px 8px; background: transparent;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; border-bottom: 2px dashed #e8dfc7; min-height: 70px;
  }
  .brand-tag .logo-cocodeck { height: 42px; width: auto; max-width: 90%; display: block; }
  .brand-tag .brand-name {
    font-family: 'Archivo Black', sans-serif; font-size: 11px;
    letter-spacing: 2.5px; color: #0a4f5e; line-height: 1;
  }
  .brand-tag .brand-sub {
    font-family: 'Caveat', cursive; font-size: 11px; color: #ff6b4a;
    line-height: 1; font-weight: 700;
  }

  .etiq-top {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 10px 10px; text-align: center;
  }
  .plat-name {
    font-family: 'Archivo Black', sans-serif; font-size: 22px;
    color: #0a4f5e; line-height: 1.1; letter-spacing: -0.3px;
    text-transform: uppercase;
  }
  .plat-desc {
    font-family: 'Caveat', cursive; font-size: 16px; color: #8a958f;
    margin-top: 6px; line-height: 1.2; font-weight: 600;
  }
  .etiq-separator {
    width: 40px; height: 3px; background: #ff6b4a; margin: 0 auto;
    border-radius: 999px;
  }
  .etiq-bottom {
    background: #0a4f5e; padding: 14px 12px; text-align: center;
    position: relative;
  }
  .etiq-bottom::before {
    content: ''; position: absolute; top: -8px; left: 0; right: 0; height: 8px;
    background-image:
      radial-gradient(circle at 6px 8px, transparent 5px, #0a4f5e 5.5px);
    background-size: 12px 8px;
    background-repeat: repeat-x;
  }
  .prix {
    font-family: 'Archivo Black', sans-serif; font-size: 32px;
    color: #ffd15c; letter-spacing: -0.5px; line-height: 1;
  }

  /* ===== PRINT ===== */
  @media print {
    body { background: #fff !important; }
    .app-header, .form-section, .section-header, .delete-btn, .no-print,
    .select-summary, [data-tab="catalogue"] { display: none !important; }
    .container { max-width: none; padding: 0; margin: 0; }
    [data-tab="etiquettes"] { display: block !important; }
    .etiquettes-grid { display: grid; grid-template-columns: repeat(5, 5.5cm); gap: 0; justify-content: center; }
    .etiquette-wrapper { width: 5.5cm; height: 10cm; }
    .etiquette {
      border-radius: 0 !important; box-shadow: none !important;
      width: 5.5cm; height: 10cm; aspect-ratio: auto;
      border: 0.5pt solid #ccc !important;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .etiquette::before, .etiq-bottom::before { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .etiquette:hover { transform: none; }
    .brand-tag, .etiq-bottom { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .editable { cursor: default !important; }
    .editable:hover, .editable:focus { background: none !important; box-shadow: none !important; }
    .editable[data-placeholder]:empty { display: none; }
  }
  @page { size: A4 landscape; margin: 5mm; }

  /* Login screen */
  .login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a4f5e 0%, #0d6476 100%);
  }
  .login-box {
    background: #fff9ec; padding: 42px; border-radius: 20px;
    border: 2px solid #ffd15c; text-align: center; width: 360px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    position: relative; overflow: hidden;
  }
  .login-box::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px;
    background: repeating-linear-gradient(90deg, #ff6b4a 0, #ff6b4a 14px, #ffd15c 14px, #ffd15c 28px, #0a4f5e 28px, #0a4f5e 42px);
  }
  .login-box h2 { font-family: 'Archivo Black', sans-serif; font-size: 26px; margin-bottom: 4px; color: #0a4f5e; letter-spacing: -0.5px; }
  .login-box .login-sub { font-family: 'Caveat', cursive; font-size: 18px; color: #ff6b4a; margin-bottom: 28px; font-weight: 700; }
  .login-box input {
    width: 100%; padding: 12px 16px; border: 1.5px solid #e2dcd0; border-radius: 12px;
    font-size: 14px; text-align: center; font-family: 'DM Sans', sans-serif;
    background: #fff;
  }
  .login-box input:focus { outline: none; border-color: #0a4f5e; }
  .login-box .login-btn {
    width: 100%; padding: 12px; margin-top: 14px; background: #0a4f5e; color: #ffd15c;
    border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: 'DM Sans', sans-serif; text-transform: uppercase; letter-spacing: 1px;
  }
  .login-box .login-btn:hover { background: #0d6476; }
  .login-box .login-error { color: #ff6b4a; font-size: 12px; margin-top: 10px; display: none; font-weight: 600; }
  .app-content { display: none; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>CocoDeck</h2>
    <div class="login-sub">Street food &amp; bonnes vibes</div>
    <input type="password" id="loginPassword" placeholder="Mot de passe" autofocus>
    <button class="login-btn" onclick="tryLogin()">Acc&eacute;der</button>
    <div class="login-error" id="loginError">Mot de passe incorrect</div>
  </div>
</div>

<script>
function tryLogin() {
  const pwd = document.getElementById('loginPassword').value;
  if (pwd === 'cocodeck2026') {
    document.getElementById('loginScreen').style.display = 'none';
    document.querySelector('.app-content').style.display = 'block';
    sessionStorage.setItem('etiq-coco-auth', '1');
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginPassword').focus();
  }
}
if (sessionStorage.getItem('etiq-coco-auth') === '1') {
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('loginScreen').style.display = 'none';
    document.querySelector('.app-content').style.display = 'block';
  });
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });
});
</script>

    <div class="section-header no-print">
      <h2>Aper&ccedil;u impression</h2>
      <span class="counter" id="counter">0</span>

    <div class="etiquettes-grid" id="grid"></div>
  </div>
</div>

// ===== STATE =====
let etiquettes = [];
let selectedCatalogIds = new Set();
let activeFilter = 'Tous';

try { const s = localStorage.getItem('etiq-cocodeck-v1'); if (s) etiquettes = JSON.parse(s); } catch(e) {}

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.trim().toLowerCase().startsWith(name.substring(0,4))));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.dataset.tab === name));
}

// ===== CATALOGUE =====
function getCategories() {
  return ['Tous', ...new Set(CATALOGUE.map(c => c.cat))];
}

function filterCatalog() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const items = CATALOGUE.filter(item => {
    const matchCat = activeFilter === 'Tous' || item.cat === activeFilter;
    const matchSearch = !search || item.name.toLowerCase().includes(search) || (item.desc || '').toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
  renderCatalogItems(items);
}

function renderCatalogFilters() {
  const cats = getCategories();
  document.getElementById('catFilters').innerHTML = cats.map(c =>
    `<button class="cat-filter ${c === activeFilter ? 'active' : ''}" onclick="setFilter('${c}')">${c}${c !== 'Tous' ? ` (${CATALOGUE.filter(i=>i.cat===c).length})` : ''}</button>`
  ).join('');
}

function setFilter(cat) { activeFilter = cat; renderCatalogFilters(); filterCatalog(); }

function renderCatalogItems(items) {
  const grid = document.getElementById('catalogGrid');
  if (!items.length) { grid.innerHTML = '<div class="empty-state"><p>Aucun produit trouv\u00e9</p></div>'; return; }
  grid.innerHTML = items.map((item, idx) => {
    const globalIdx = CATALOGUE.indexOf(item);
    const inEtiq = etiquettes.some(e => e.catalogIdx === globalIdx);
    return `<div class="catalog-item ${inEtiq ? 'selected' : ''}">
      <div class="item-info">
        <div class="item-name">${esc(item.name)}</div>
        ${item.desc ? `<div class="item-desc">${esc(item.desc)}</div>` : ''}
      </div>
      <div class="item-prix">${item.prix ? esc(item.prix) + ' ' + esc(item.unit) : '\u2014'}</div>
      <button class="btn ${inEtiq ? 'btn-outline' : 'btn-add'} btn-small" onclick="toggleCatalogItem(${globalIdx})">
        ${inEtiq ? 'Retirer' : 'Ajouter'}
      </button>
    </div>`;
  }).join('');
}

function toggleCatalogItem(idx) {
  const existing = etiquettes.findIndex(e => e.catalogIdx === idx);
  if (existing >= 0) {
    etiquettes.splice(existing, 1);
  } else {
    const item = CATALOGUE[idx];
    etiquettes.push({ name: item.name, desc: item.desc || '', prix: item.prix || '', unit: item.unit, id: Date.now() + Math.random(), catalogIdx: idx });
  }
  save(); render(); filterCatalog(); updateBadge();
}

// ===== MANUAL ADD =====
function addManual() {
  const name = document.getElementById('platName').value.trim();
  const desc = document.getElementById('platDesc').value.trim();
  const prix = document.getElementById('platPrix').value.trim();
  const unit = document.getElementById('platUnit').value;
  if (!name || !prix) { document.getElementById('platName').focus(); return; }
  etiquettes.push({ name, desc, prix, unit, id: Date.now(), catalogIdx: -1 });
  save(); render(); updateBadge();
  document.getElementById('platName').value = '';
  document.getElementById('platDesc').value = '';
  document.getElementById('platPrix').value = '';
  document.getElementById('platName').focus();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && document.activeElement?.closest('.form-section')) {
    e.preventDefault(); addManual();
  }
});

// ===== ETIQUETTES =====
function removeEtiquette(id) { etiquettes = etiquettes.filter(e => e.id !== id); save(); render(); filterCatalog(); updateBadge(); }

function onEditField(el) {
  const idx = parseInt(el.dataset.idx);
  const field = el.dataset.field;
  const val = el.textContent.trim();
  if (idx >= 0 && idx < etiquettes.length && field) {
    etiquettes[idx][field] = val;
    save();
  }
}

function clearAll() {
  if (!etiquettes.length || !confirm('Effacer toutes les etiquettes ?')) return;
  etiquettes = []; save(); render(); filterCatalog(); updateBadge();
}

function save() { localStorage.setItem('etiq-cocodeck-v1', JSON.stringify(etiquettes)); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function updateBadge() {
  const badge = document.getElementById('etiqBadge');
  const summary = document.getElementById('selectSummary');
  const count = document.getElementById('selectedCount');
  if (etiquettes.length > 0) {
    badge.style.display = 'inline'; badge.textContent = etiquettes.length;
    summary.style.display = 'flex'; count.textContent = etiquettes.length;
  } else {
    badge.style.display = 'none'; summary.style.display = 'none';
  }
}

function render() {
  const grid = document.getElementById('grid');
  document.getElementById('counter').textContent = etiquettes.length + ' \u00e9tiquette' + (etiquettes.length !== 1 ? 's' : '');

  if (!etiquettes.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">&#127796;</div><p>S\u00e9lectionnez des produits dans le catalogue ou ajoutez-en manuellement</p></div>';
    return;
  }

  grid.innerHTML = etiquettes.map((e, i) => `
    <div class="etiquette-wrapper">
      <button class="delete-btn no-print" onclick="removeEtiquette(${typeof e.id === 'number' ? e.id : `'${e.id}'`})" title="Supprimer">&#10005;</button>
      <div class="etiquette">
        <div class="brand-tag">
          <svg class="logo-cocodeck" viewBox="0 0 320 140" xmlns="http://www.w3.org/2000/svg" aria-label="CocoDeck" shape-rendering="geometricPrecision">
            <!-- Soleil -->
            <circle cx="78" cy="52" r="20" fill="#ffd15c"/>

            <g stroke="#ffd15c" stroke-width="3" stroke-linecap="round">
              <line x1="78" y1="20" x2="78" y2="28"/>

            <!-- Palmier (palmes) -->
            <g fill="#0a4f5e">
              <path d="M 194 30 Q 160 24 136 42 Q 158 36 194 36 Z"/>

            </g>

            <!-- Vagues -->
            <g stroke="#0a4f5e" stroke-width="3" fill="none" stroke-linecap="round">
              <path d="M 30 118 Q 50 112 70 118 T 110 118 T 150 118 T 190 118 T 230 118 T 270 118 T 290 118"/>

          </svg>
          <span class="brand-name">COCODECK</span>

        </div>

          <div class="plat-desc editable" contenteditable="true" data-idx="${i}" data-field="desc" onblur="onEditField(this)" ${!e.desc ? 'data-placeholder="Description..."' : ''}>${esc(e.desc || '')}</div>
        </div>
        <div class="etiq-separator"></div>
        <div class="etiq-bottom">
          <div class="prix editable" contenteditable="true" data-idx="${i}" data-field="prix" onblur="onEditField(this)" ${!e.prix ? 'data-placeholder="Prix"' : ''}>${esc(e.prix || '')}</div>
          <div class="prix-unit">${esc(e.unit)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

// ===== INIT =====
renderCatalogFilters();
filterCatalog();
render();
updateBadge();
</script>
</div><!-- /app-content -->
